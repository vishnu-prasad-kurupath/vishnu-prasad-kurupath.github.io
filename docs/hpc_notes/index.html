<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Reveal + Simplemenu + Footer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Reveal core from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css" id="theme">

    <!-- Simplemenu CSS (default styling) -->
    <link rel="stylesheet" href="../simplemenu/simplemenu.css">

    <style>
      body {
        margin: 0;
      }
      
      .footer-bar {
        position: fixed;
        left: 0;
        bottom: 0.2rem;              /* a bit above the very bottom */
        width: 100%;
        box-sizing: border-box;
        font-family: system-ui, sans-serif;
        font-size: 0.8rem;
        color: #ccc;
        text-align: center;
        pointer-events: none;        /* ensure Reveal controls and slide number remain clickable */
        z-index: 30;
      }

      .footer-bar span {
        pointer-events: auto;
      }
    </style>
  </head>

  <body>
    <!-- Reveal root (Simplemenu will create its own menubar) -->
    <div class="reveal">
      <div class="slides">
        <!-- Top-level sections with data-name become Simplemenu items [file:1] -->
        <section data-name="Introduction">
          <h2>Introduction</h2>
          <p>Welcome to the deck.</p>
        </section>

        <section data-name="Problem statement">
          <h2>Problem Statement</h2>
          <p>Describe the main problem here.</p>
        </section>

        <section data-name="Results">
          <h2>Results</h2>
          <p>Key findings.</p>
        </section>

        <section data-name="Conclusion">
          <h2>Conclusion</h2>
          <p>Wrap-up and outlook.</p>
        </section>
      </div>
    </div>

    <!-- Author/title footer bar (independent of Simplemenu) -->
    <div class="footer-bar">
      <span>(c) Vishnu Kurupath — HPC Notes</span>
    </div>

    <!-- Reveal core -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>

    <!-- Simplemenu plugin -->
    <script src="../simplemenu/simplemenu.js"></script>

    <script>
      Reveal.initialize({
        hash: true,
        controls: true,
        progress: true,
        slideNumber: 'c/t',   // default bottom-right slide number [web:1][web:5]

        simplemenu: {
          // Use Simplemenu exactly as documented: auto-generate menu from data-name [file:1]
          barhtml: {
            header: "<div class='menubar'><ul class='menu'></ul><div>",
            footer: ""
          },
          // Leave other options at their defaults
          // menuclass: "menu",
          // activeclass: "active",
          // activeelement: "li",
          // selectby: "id",
          // flat: false,
          // scale: 0.67,
          csspath: ""   // use plugin's own CSS [file:1]
        },

        plugins: [ Simplemenu ]
      });
    </script>
  </body>
</html>
