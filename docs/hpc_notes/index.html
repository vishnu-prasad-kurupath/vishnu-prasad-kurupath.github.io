<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>HPC Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Reveal core from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css" id="theme">

    <!-- Simplemenu CSS (default styling) -->
    <link rel="stylesheet" href="../simplemenu/simplemenu.css">

    <style>
      body {
        margin: 0;
      }
      
      .footer-bar {
        position: fixed;
        left: 0;
        bottom: 0.2rem;              /* a bit above the very bottom */
        width: 100%;
        box-sizing: border-box;
        font-family: system-ui, sans-serif;
        font-size: 0.8rem;
        color: #ccc;
        text-align: center;
        pointer-events: none;        /* ensure Reveal controls and slide number remain clickable */
        z-index: 30;
      }

      .footer-bar span {
        pointer-events: auto;
      }

      .menubar .menu li a {
        font-size: 1.0rem;     /* try 0.8rem, 0.75rem, etc. */
        padding: 0.15rem 0.5rem; /* slightly tighter vertical padding */
      }

      .two-columns {
        display: flex;
        gap: 2rem;
        justify-content: center;
        align-items: flex-start;
        margin-top: 1.5rem;
      }
      .two-columns .col {
        flex: 1 1 0;
      }

    </style>
  </head>

  <body>
    <!-- Reveal root (Simplemenu will create its own menubar) -->
    <div class="reveal">
      <!-- <div class="slides">
        <section data-markdown="./slides.md"
                 data-separator="^\n---\n$"
                 data-separator-vertical="^\n--\n$"
                 data-charset="utf-8">
        </section>
      </div> -->

      <div class="slides">
  <section data-name="Intro">
    <h2>Intro</h2>
    <p>Test slide.</p>
  </section>
</div>
    </div>

    <!-- Author/title footer bar (independent of Simplemenu) -->
    <div class="footer-bar">
      <span>(c) Vishnu Kurupath — HPC Notes</span>
    </div>

    <!-- Reveal core -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>

    <!-- Simplemenu plugin -->
    <script src="../simplemenu/simplemenu.js"></script>

    <!-- Markdown -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script> -->


    <script>
      Reveal.initialize({
        hash: true,
        controls: true,
        progress: true,
        slideNumber: 'c/t',   // default bottom-right slide number [web:1][web:5]

        simplemenu: {
          // Use Simplemenu exactly as documented: auto-generate menu from data-name [file:1]
          barhtml: {
            header: "<div class='menubar'><ul class='menu'></ul></div>",
            footer: ""
          },
          // Leave other options at their defaults
          // menuclass: "menu",
          // activeclass: "active",
          // activeelement: "li",
          // selectby: "id",
          flat: false,
          // scale: 0.67,
          csspath: ""   // use plugin's own CSS [file:1]
        },

        plugins: [ Simplemenu]
      });
    </script>
  </body>
</html>
