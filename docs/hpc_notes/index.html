<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>HPC Notes</title>
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css"
          id="theme">

    <style>
      body { margin: 0; }

      .footer-bar {
        position: fixed;
        left: 0;
        bottom: 0;
        width: 100%;
        box-sizing: border-box;
        font-family: system-ui, sans-serif;
        font-size: 0.8rem;
        color: #ccc;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        padding: 0.25rem 0.75rem;
        z-index: 30;
      }
      .footer-left,
      .footer-center,
      .footer-right {
        flex: 1 1 0;
        display: flex;
        align-items: center;
      }
      .footer-left { justify-content: flex-start; }
      .footer-center { justify-content: center; }
      .footer-right { justify-content: flex-end; }

      .footer-name-title { white-space: nowrap; }

      .footer-section { position: relative; }

      .footer-section-button {
        border: 1px solid #666;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.6);
        color: #eee;
        padding: 0.15rem 0.5rem;
        cursor: pointer;
        font: inherit;
      }
      .footer-section-button .section-label {
        font-weight: 600;
      }
      .footer-section-button .caret {
        margin-left: 0.25rem;
        opacity: 0.8;
      }

      .section-menu {
        position: absolute;
        left: 0;
        bottom: 100%;
        margin-bottom: 0.3rem;
        min-width: 10rem;
        max-height: 50vh;
        overflow-y: auto;
        background: #111;
        border: 1px solid #555;
        border-radius: 4px;
        box-shadow: 0 0 8px rgba(0,0,0,0.6);
        padding: 0.25rem 0;
        list-style: none;
        display: none;
        z-index: 40;
      }
      .section-menu li { margin: 0; }
      .section-menu button {
        width: 100%;
        border: none;
        background: transparent;
        color: #ccc;
        text-align: left;
        padding: 0.2rem 0.5rem;
        font: inherit;
        cursor: pointer;
      }
      .section-menu button:hover {
        background: #333;
        color: #fff;
      }
      .section-menu button.active {
        background: #444;
        color: #fff;
        font-weight: 600;
      }

      .footer-slide-number {
        font-weight: 700;
        color: #fff;
      }

      .reveal .controls {
        bottom: 0.5rem;
        left: 0.5rem;
        top: auto;
        right: auto;
      }
      .two-columns {
        display: flex;
        gap: 2rem;
        justify-content: center;
        align-items: flex-start;
        margin-top: 1.5rem;
      }
      .two-columns .col {
        flex: 1 1 0;
      }
    </style>
  </head>

  <body>
    <div class="reveal">
      <div class="slides">
        <section
          data-markdown="slides.md"
          data-separator="^\r?\n---\r?\n$"
          data-separator-vertical="^\r?\n--\r?\n$"
          data-charset="utf-8">
        </section>
      </div>
    </div>

    <div class="footer-bar">
      <div class="footer-left">
        <div class="footer-name-title">
          (c) Vishnu Kurupath — HPC Notes
        </div>
      </div>
      <div class="footer-center">
        <div class="footer-section">
          <button class="footer-section-button" id="section-toggle">
            <span class="section-label" id="current-section-label">Section</span>
            <span class="caret">▲</span>
          </button>
          <ul class="section-menu" id="section-menu"></ul>
        </div>
      </div>
      <div class="footer-right">
        <span class="footer-slide-number" id="footer-slide-number">–/–</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>

    <script>
      Reveal.initialize({
        hash: true,
        controls: true,
        progress: true,
        slideNumber: false,
        plugins: [ RevealMarkdown ]
      });

      const sectionMenu = document.getElementById('section-menu');
      const sectionToggle = document.getElementById('section-toggle');
      const currentSectionLabel = document.getElementById('current-section-label');
      const footerSlideNumber = document.getElementById('footer-slide-number');

      // Get all top-level horizontal sections
      function getHorizontalSectionsRoot() {
        return document.querySelector('.reveal .slides');
      }

      function getHorizontalSections() {
        const root = getHorizontalSectionsRoot();
        if (!root) return [];
        return Array.from(root.children).filter(s => s.tagName.toLowerCase() === 'section');
      }

      function getTitleFromSection(sectionEl, fallbackIndex) {
        // Try a heading in the first vertical child if present, else in the section itself
        let container = sectionEl;
        const firstChild = sectionEl.querySelector('section');
        if (firstChild) {
          container = firstChild;
        }
        const h = container.querySelector('h1, h2, h3, h4, h5, h6');
        if (!h) return 'Slide ' + (fallbackIndex + 1);
        return h.textContent.trim();
      }

      function buildSectionMenu() {
        sectionMenu.innerHTML = '';
        const horizSections = getHorizontalSections();

        horizSections.forEach((sec, hIndex) => {
          const title = getTitleFromSection(sec, hIndex);
          sec.dataset.sectionName = title;

          const li = document.createElement('li');
          const btn = document.createElement('button');
          btn.textContent = title;
          btn.addEventListener('click', () => {
            // Jump to first vertical slide of this horizontal section
            Reveal.slide(hIndex, 0);
            sectionMenu.style.display = 'none';
          });
          li.appendChild(btn);
          sectionMenu.appendChild(li);
        });

        updateFooterState();
      }

      function updateFooterState() {
        const indices = Reveal.getIndices();
        const h = indices.h || 0;

        const horizSections = getHorizontalSections();
        const currentSection = horizSections[h];

        const sectionName = currentSection
          ? (currentSection.dataset.sectionName || getTitleFromSection(currentSection, h))
          : '';

        if (sectionName) {
          currentSectionLabel.textContent = sectionName;
        }

        const buttons = sectionMenu.querySelectorAll('button');
        buttons.forEach((btn) => {
          btn.classList.toggle('active', btn.textContent === sectionName);
        });

        // Compute flat slide number (Reveal's built-in count)
        const total = Reveal.getTotalSlides();
        const current = Reveal.getSlidePastCount() + 1;
        footerSlideNumber.textContent = current + '/' + total;
      }

      sectionToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        const isVisible = sectionMenu.style.display === 'block';
        sectionMenu.style.display = isVisible ? 'none' : 'block';
      });

      document.addEventListener('click', () => {
        sectionMenu.style.display = 'none';
      });

      Reveal.on('ready', () => {
        buildSectionMenu();
      });

      Reveal.on('slidechanged', () => {
        updateFooterState();
      });
    </script>
  </body>
</html>
