<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Reveal + Simplemenu (CDN Reveal)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Reveal core styles from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css" id="theme">

    <!-- Simplemenu CSS (either from plugin or your own copy) -->
    <link rel="stylesheet" href="../simplemenu.css">
    <!-- If you don't want to copy CSS, you can instead style the menu yourself and set csspath: false in options. [web:90] -->
  </head>

  <body>
    <!-- Reveal root -->
    <div class="reveal">
      <!-- Simplemenu can insert the menubar automatically via the barhtml option,
           so we do NOT hard-code the menubar here. [web:90] -->
      <div class="slides">
        <!-- Top-level slides with data-name become menu items -->
        <section data-name="Introduction">
          <h2>Introduction</h2>
          <p>Welcome to the demo deck.</p>
        </section>

        <section data-name="Problem Statement">
          <h2>Problem Statement</h2>
          <p>Describe the main problem here.</p>
        </section>

        <section data-name="Results">
          <h2>Results</h2>
          <p>Summarize key results.</p>
        </section>

        <section data-name="Conclusion">
          <h2>Conclusion</h2>
          <p>Wrap-up and next steps.</p>
        </section>
      </div>
    </div>

    <!-- Reveal core from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>

    <!-- Simplemenu plugin script.
         Option A: commit plugin/simplemenu/simplemenu.js in your repo and reference it.
         Option B: host simplemenu.js somewhere static and reference that URL here. [web:90] -->
    <script src="../simplemenu.js"></script>

    <script>
      Reveal.initialize({
        hash: true,
        controls: true,
        progress: true,
        slideNumber: 'c/t',  // current / total [web:5]

        simplemenu: {
          // Automatically add a menubar with an empty <ul class="menu">,
          // which Simplemenu will populate from data-name attributes. [web:90]
          barhtml: {
            header: "<div class='menubar'><ul class='menu'></ul><div class='slide-number'></div></div>",
            footer: ""
          },
          // Keep default behavior: use top-level sections as chapters
          flat: false,
          csspath: ""   // or set to your own CSS; empty uses included default [web:90]
        },

        plugins: [ Simplemenu ]
      });
    </script>
  </body>
</html>
