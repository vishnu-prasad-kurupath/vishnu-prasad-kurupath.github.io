<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Deck with Sidebar Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Reveal core from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css" id="theme">

    <!-- Simplemenu base CSS -->
    <link rel="stylesheet" href="../simplemenu/simplemenu.css">

    <style>
      body {
        margin: 0;
      }

      /* Make the Simplemenu "menubar" a left sidebar */
      .menubar {
        position: fixed;
        top: 0;
        left: 0;
        width: 240px;
        height: 100vh;
        background: #111;
        color: #eee;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        padding: 1rem 0.75rem;
        z-index: 20;
      }

      .sidebar-header {
        margin-bottom: 1rem;
      }

      .sidebar-title {
        font-size: 1rem;
        font-weight: 700;
      }

      .sidebar-author {
        font-size: 0.8rem;
        opacity: 0.8;
      }

      /* Menu list in the middle */
      .menubar .menu {
        list-style: none;
        padding: 0;
        margin: 0;
        flex: 1 1 auto;
        overflow-y: auto;
      }

      .menubar .menu li {
        margin: 0.25rem 0;
      }

      .menubar .menu a {
        display: block;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        color: inherit;
        text-decoration: none;
        font-size: 0.9rem;
      }

      .menubar .menu a:hover {
        background: #333;
      }

      /* Active chapter highlighting (Simplemenu adds .active by default) */
      .menubar .menu li.active a {
        background: #4caf50;
        color: #fff;
      }

      /* Slide number area at bottom of sidebar */
      .sidebar-footer {
        margin-top: 0.75rem;
        font-size: 0.8rem;
        opacity: 0.9;
      }

      /* Simplemenu moves Reveal's slide number into this div if it exists */
      .sidebar-footer .slide-number {
        display: inline-block;
        margin-top: 0.25rem;
      }

      /* Push Reveal stage to the right so it doesn’t sit under the sidebar */
      .reveal {
        margin-left: 240px;
      }
    </style>
  </head>

  <body>
    <div class="reveal">
      <div class="slides">
        <!-- Top-level sections with data-name become menu items -->
        <section data-name="Intro">
          <h2>Introduction</h2>
          <p>Welcome to the deck.</p>
        </section>

        <section data-name="Background">
          <h2>Background</h2>
          <p>Some context here.</p>
        </section>

        <section data-name="Results">
          <h2>Results</h2>
          <p>Key findings.</p>
        </section>

        <section data-name="Conclusion">
          <h2>Conclusion</h2>
          <p>Wrap-up and outlook.</p>
        </section>
      </div>
    </div>

    <!-- Reveal core -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>

    <!-- Shared Simplemenu JS -->
    <script src="../simplemenu/simplemenu.js"></script>

    <script>
      Reveal.initialize({
        hash: true,
        controls: true,
        progress: true,
        slideNumber: 'c/t',  // this will be moved into .slide-number by Simplemenu [file:1]

        simplemenu: {
          // Inject a custom sidebar markup that Simplemenu will use.
          barhtml: {
            header:
              "<div class='menubar'>" +
                "<div class='sidebar-header'>" +
                  "<div class='sidebar-title'>Short Title</div>" +
                  "<div class='sidebar-author'>V. P. Kurupath</div>" +
                "</div>" +
                "<ul class='menu'></ul>" + // Simplemenu auto-fills this from data-name [file:1]
                "<div class='sidebar-footer'>" +
                  "<div>Slide:</div>" +
                  "<div class='slide-number'></div>" + // slide number moved here [file:1]
                "</div>" +
              "</div>",
            footer: ""
          },
          csspath: "",   // we already loaded simplemenu CSS; keep default behavior [file:1]
          flat: false
        },

        plugins: [ Simplemenu ]
      });
    </script>
  </body>
</html>
